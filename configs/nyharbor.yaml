# Real-data local test: NY Harbor June 2022 (via GenAIS adapter).
# Single month -> split by day-of-month. NOT the paper protocol; for local
# real-numbers validation before the cluster run on full Jan-Jun 2019.
paths:
  raw: data/nyharbor/raw
  interim: data/nyharbor/interim
  processed: data/nyharbor/processed
  results: data/nyharbor/results

extraction:
  max_gap_hours: 2.0
  min_span_hours: 6.0
  min_messages: 160
  abnormal_max_sog: 1.0
  moving_sog_threshold: 2.0
  min_moving_fraction: 0.30
  fixed_length: 160

encoding:
  bins: {LAT: 50, LON: 50, SOG: 30, COG: 36, WID: 10, LEN: 20, DRA: 10}
  use_len: true
  use_wid: true
  use_dra: true

model:
  n_classes: 4
  conv_channels: [5, 5, 5, 5, 5]
  conv_kernels: [10, 10, 10, 5, 3]
  label_embed_dim: 50
  latent_dim: 20
  decoder_fc_dim: 250

train:
  lr: 0.0001
  batch_size: 100
  epochs: 50
  labeled_fraction: 0.20
  beta: 10.0
  seed: 42
  device: auto
  num_workers: 0
