# Cluster target: US Gulf of Mexico, full Jan-Jun 2019, paper temporal split.
# Heavy mix of fishing / cargo / tanker / passenger -> good 4-class balance.
bbox:
  lat_min: 25.0
  lat_max: 31.0
  lon_min: -98.0
  lon_max: -82.0

paths:
  raw: data/gulf2019/raw
  interim: data/gulf2019/interim
  processed: data/gulf2019/processed
  results: data/gulf2019/results

download:
  year: 2019
  months: [1, 2, 3, 4, 5, 6]
  # full reproduction: every day. For a lighter run set e.g. max_days_per_month: 4
  max_days_per_month: null

ingest:
  chunk_size: 100000
  max_sog_knots: 60.0
  train_months: [1, 2, 3, 4]   # paper protocol
  val_months: [5]
  test_months: [6]

extraction:
  max_gap_hours: 2.0
  min_span_hours: 6.0
  min_messages: 160
  abnormal_max_sog: 1.0
  moving_sog_threshold: 2.0
  min_moving_fraction: 0.30
  fixed_length: 160

encoding:
  bins: {LAT: 50, LON: 50, SOG: 30, COG: 36, WID: 10, LEN: 20, DRA: 10}
  use_len: true
  use_wid: true
  use_dra: true

model:
  n_classes: 4
  conv_channels: [5, 5, 5, 5, 5]
  conv_kernels: [10, 10, 10, 5, 3]
  label_embed_dim: 50
  latent_dim: 20
  decoder_fc_dim: 250

train:
  lr: 0.0001
  batch_size: 100
  epochs: 50
  labeled_fraction: 0.20
  beta: 10.0
  seed: 42
  device: auto    # cluster: set to "cuda"
  num_workers: 4
